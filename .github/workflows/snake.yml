name: Generate Snake Animation

on:
  # Re-generate once a day so the snake stays current
  schedule:
    - cron: "0 0 * * *"
  # Let you run it manually from the Actions tab
  workflow_dispatch:
  # Also run on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake game from contribution graph
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          # Teal snake eating a teal→brass gradient of contribution dots
          outputs: |
            dist/snake.svg?color_snake=%2314b8a6&color_dots=%230d1117,%230f766e,%2314b8a6,%235eead4,%23c9a227

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
