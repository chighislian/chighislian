name: Refresh README Images

# Manual refresh only — no scheduled runs, so it uses ~zero Actions minutes.
# Click "Run workflow" in the Actions tab whenever you want your profile
# cards (streak, followers, views) to pull fresh numbers.

on:
  workflow_dispatch:   # the only trigger — runs when YOU click it

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Purge cached profile images
        run: |
          PROFILE="https://github.com/${{ github.repository_owner }}"
          echo "Reading profile page: $PROFILE"
          URLS=$(curl -s -A "Mozilla/5.0" "$PROFILE" \
            | grep -oE 'https://camo\.githubusercontent\.com/[a-zA-Z0-9]+' \
            | sort -u)
          COUNT=$(echo "$URLS" | grep -c . || true)
          echo "Found $COUNT cached images to purge."
          echo "$URLS" | while read -r url; do
            [ -z "$url" ] && continue
            echo "Purging: $url"
            curl -s -X PURGE "$url" > /dev/null
          done
          echo "Done. Hard-refresh your profile (Ctrl+F5) to see fresh numbers."
