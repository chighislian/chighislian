name: Refresh README Images

# Keeps the streak card, badges, and other external images on your
# profile README up to date by clearing GitHub's image cache (Camo)
# on a schedule. The data was always live — this just forces GitHub
# to re-fetch the picture more often.

on:
  schedule:
    - cron: "0 */1 * * *"   # every 4 hours
  workflow_dispatch:          # lets you run it manually from the Actions tab

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Purge cached README images
        run: |
          echo "Fetching rendered README to find cached image URLs..."
          curl -s -H "Accept: application/vnd.github.html+json" \
            "https://api.github.com/repos/${{ github.repository }}/readme" \
            | grep -oE 'https://camo\.githubusercontent\.com/[a-zA-Z0-9]+' \
            | sort -u \
            | while read -r url; do
                echo "Purging: $url"
                curl -s -X PURGE "$url" > /dev/null
              done
          echo "Done. Fresh images will load on next visit."
